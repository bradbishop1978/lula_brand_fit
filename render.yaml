services:
  - type: web
    name: n8n-aircall
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    autoDeploy: true
    branch: main
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: http
      - key: WEBHOOK_TUNNEL_URL
        value: https://n8n-aircall.onrender.com
