  #result-count { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 10px; }

function dots(n, max=5) {
  let s = '';
  for (let i=0;i<max;i++) s += `<span class="score-dot" style="background:${i<n?'#639922':'var(--color-border-tertiary)'}"></span>`;
  return s;
}

function verdictTag(v) {
  if (v==='rec') return '<span class="tag tag-go">Launch ready</span>';
  if (v==='warn') return '<span class="tag tag-warn">Verify first</span>';
  return '<span class="tag tag-no">Avoid</span>';
}

function rowClass(v) {
  if (v==='rec') return '';
  if (v==='warn') return '';
  return 'row-no';
}

let currentFilter = 'all';

function filterTable(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  let lastSection = null;
  let count = 0;

  brands.forEach(b => {
    if (currentFilter === 'rec' && b.verdict !== 'rec') return;
    if (currentFilter === 'cstore' && b.cat !== 'cstore') return;
    if (currentFilter === 'fuel' && b.cat !== 'fuel') return;
    if (currentFilter === 'qsr' && b.cat !== 'qsr') return;

    if (b.section && b.section !== lastSection) {
      const sr = document.createElement('tr');
      sr.className = 'section-header';
      sr.innerHTML = `<td colspan="7">${b.section}</td>`;
      tbody.appendChild(sr);
      lastSection = b.section;
    }

    const tr = document.createElement('tr');
    const rowBg = b.verdict === 'no' ? 'background: #FCEBEB;' : b.verdict === 'warn' ? '' : '';
    tr.style.cssText = rowBg;

    tr.innerHTML = `
      <td>
        <div class="brand-name">${b.name}</div>
        <div class="brand-sub">${b.sub}</div>
      </td>
      <td style="white-space:nowrap;">${b.locs}</td>
      <td>${dots(b.autonomy)}</td>
      <td style="font-size:12px; color:var(--color-text-secondary);">${b.hook}</td>
      <td>${dots(b.gap)}</td>
      <td>${verdictTag(b.verdict)}</td>
      <td style="font-size:12px; color:var(--color-text-secondary);">${b.note}</td>
    `;
    tbody.appendChild(tr);
    count++;
  });

  document.getElementById('result-count').textContent = `Showing ${count} brand${count!==1?'s':''}.`;
}

renderTable();
</script>
